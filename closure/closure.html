<!DOCTYPE pt-br>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closure</title>
    <script src="closure.js"></script>
</head>
<body>
    <h1>Closure</h1>
    <p>Contagem com variável local</p>
    <pd id= "demo"></id>
    <button type="button" onclick="minhaFunc()">Conte!</button>
    <script>
        
        function meuContador(){
            let contador = 0;
            return () => {
                contador++; 
                return contador;
            }
        }
        
        const adicionar = meuContador(); 

        function minhaFunc(){
            document.getElementById("demo").innerHTML = adicionar();
        }
        </script>
</body>
</html>
